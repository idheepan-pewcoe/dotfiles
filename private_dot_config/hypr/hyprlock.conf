# --- Variables ---
$wallpaper = ~/Pictures/Wallpapers/current.png
$font_choice = Iosevka Nerd Font

# Color Palette
$base_bg = rgb(255, 255, 255)
$text_main = rgba(220, 220, 220, 0.8)
$text_user = rgb(220, 220, 220)
$shape_bg = rgba(0, 0, 0, 0.1)
$shape_border = rgba(0, 0, 0, 1.0)

# Input Field Colors
$input_outer = rgba(50, 50, 50, 0.0)
$input_inner = rgba(50, 50, 50, 0.1)
$input_check = rgba(50, 50, 50, 0.1)
$input_fail = rgb(255, 100, 100)
$input_text = rgb(220, 220, 220)
# $placeholder_color = rgba(230, 200, 255, 0.5)


# --- Config ---

general {
    hide_cursor = true
    ignore_empty_input = true
}

animations {
    enabled = false
}

background {
    monitor =
    path = $wallpaper
    color = $base_bg
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%I:%M")</span>"
    color = $text_main
    font_size = 60
    font_family = $font_choice
    position = 0, -20
    halign = center
    valign = center
}

# Day-Month-Date
label {
    monitor =
    text = cmd[update:60000] echo -e "$(date +"%A, %B %d")"
    color = $text_main
    font_size = 19
    font_family = $font_choice
    position = 0, -90
    halign = center
    valign = center
}

# USER-BOX (Shape)
shape {
    monitor =
    size = 320, 55
    color = $shape_bg
    rounding = -1
    border_size = 0
    border_color = $shape_border
    position = 0, -190
    halign = center
    valign = center
}

# USER (Label)
label {
    monitor =
    text =     $USER
    color = $text_user
    font_size = 14
    font_family = $font_choice
    position = 0, -190
    halign = center
    valign = center
}

# Input Field
input-field {
    monitor =
    size = 320, 55
    outline_thickness = 0
    dots_size = 0.1
    dots_spacing = 0.2
    dots_center = true
    outer_color = $input_outer
    inner_color = $input_inner
    check_color = $input_check
    fail_color = $input_fail
    font_color = $input_text
    fade_on_empty = false
    font_family = $font_choice
    placeholder_text = <i>   password</i>
    # placeholder_color = $placeholder_color
    hide_input = false
    position = 0, -268
    halign = center
    valign = center
}

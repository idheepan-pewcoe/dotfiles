general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid starting multiple hyprlock instances.
    before_sleep_cmd = loginctl lock-session    # lock before suspend.
    after_sleep_cmd = niri msg action power-on-monitors # turn on display after sleep.
}

listener {
    timeout = 300                                # 5 mins
    on-timeout = loginctl lock-session           # lock screen
}

listener {
    timeout = 600                                # 10 mins
    on-timeout = niri msg action power-off-monitors # turn off screen
}
